<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Live Scoreboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="hero">
      <div class="hero__title">
        <span class="hero__badge">NBA</span>
        <div>
          <p class="hero__eyebrow">Live Game Center</p>
          <h1>League Courtside</h1>
        </div>
      </div>
      <div class="hero__meta">
        <p id="updated">Updated --</p>
        <p id="status">Waiting for tipoff</p>
      </div>
      <div class="hero__controls">
        <label class="zoom-control">
          Zoom
          <select id="zoom-select">
            <option value="0.8">80%</option>
            <option value="0.9">90%</option>
            <option value="1">100%</option>
            <option value="1.1">110%</option>
            <option value="1.2">120%</option>
          </select>
        </label>
        <button class="hero__toggle" id="scoreboard-toggle" type="button">Compact</button>
      </div>
    </header>

    <main class="layout" id="app">
      <section class="game-list" id="list-view">
        <div class="game-list__header">
          <div>
            <p class="game-list__eyebrow">Today</p>
            <h2>Pick a game</h2>
          </div>
          <div class="game-list__meta">
            <span id="selected-game">Select a game</span>
            <button id="clear-selection" type="button">Clear</button>
          </div>
        </div>
        <div class="game-list__body" id="games"></div>
      </section>
      <section class="game-view" id="game-view" hidden>
        <div class="game-view__header">
          <button id="back-to-list" type="button">Back to games</button>
          <div class="game-view__meta">
            <span id="selected-game-view">Select a game</span>
          </div>
        </div>
        <section class="scoreboard" id="scoreboard">
          <div class="scoreboard__teams">
            <div class="team-card" id="away-card"></div>
            <div class="scoreboard__center" id="game-center"></div>
            <div class="team-card" id="home-card"></div>
          </div>
          <div class="scoreboard__details" id="game-details"></div>
          <div class="periods" id="periods"></div>
        </section>

        <section class="tables">
          <div class="table-card">
            <div class="table-card__header" id="away-header"></div>
            <div class="table-card__body" id="away-table"></div>
          </div>
          <div class="table-card">
            <div class="table-card__header" id="home-header"></div>
            <div class="table-card__body" id="home-table"></div>
          </div>
        </section>

        <section class="fallback" id="fallback"></section>
      </section>
    </main>

    <script>
      fetch("/api/ping", { cache: "no-store" }).catch(() => {});
      window.onerror = function (message, source, lineno, colno) {
        const msg = encodeURIComponent(`${message} @ ${source}:${lineno}:${colno}`);
        fetch(`/api/log?msg=${msg}`).catch(() => {});
      };
    </script>
    <script src="app.js"></script>
  </body>
</html>
